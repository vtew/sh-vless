on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
      - run: gradle jar
      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/server.jar
          tag_name: latest
